name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: app1-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy app1.edengrup.com
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 45
    steps:
      - name: Deploy live checkout
        shell: bash
        run: /home/edengrup-app1/htdocs/app1.edengrup.com/scripts/deploy-production.sh
